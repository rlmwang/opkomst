# Local prod-like stack: Postgres + API. The email sweeps now run
# as cron-style one-shots via ``backend.cli`` — there's no
# long-running worker container any more (Coolify's scheduled-task
# feature invokes ``python -m backend.cli ...`` on each cadence in
# production). For local dev / smoke testing, run the same commands
# manually as needed.
#
# Usage:
#   make db-up                 # postgres only, fastest dev loop
#   docker compose up --build  # full stack
#   curl http://localhost:8000/health
#
# Email sweeps locally:
#   docker compose run --rm api python -m backend.cli dispatch reminder

services:
  postgres:
    image: postgres:16-alpine
    # 5433 (not 5432) so a host-side Postgres install on the dev
    # box doesn't collide with this one.
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: opkomst
      POSTGRES_PASSWORD: opkomst
      POSTGRES_DB: opkomst
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U opkomst -d opkomst"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: .
    image: opkomst:latest
    ports:
      - "8000:8000"
    env_file:
      - .env
    # In-container, the API talks to the postgres service by name —
    # override DATABASE_URL so the value in .env (which points at
    # localhost:5433 for host-side dev) doesn't leak in.
    environment:
      DATABASE_URL: postgresql+psycopg://opkomst:opkomst@postgres:5432/opkomst
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  postgres-data:
