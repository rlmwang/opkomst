<!DOCTYPE html>
<html lang="{{ locale }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f6f1e7; color: #1a1a1a; }
    .container { max-width: 600px; margin: 0 auto; padding: 32px 20px; }
    .card { background: #fbf7ee; border: 1px solid #e6dec9; border-radius: 12px; padding: 32px 28px; }
    .logo { font-size: 22px; font-weight: 700; color: #9f000b; text-align: center; margin-bottom: 24px; letter-spacing: 0.5px; }
    .content { font-size: 15px; line-height: 1.55; color: #1a1a1a; }
    .content p { margin: 0 0 14px; }
    .cta { display: block; width: fit-content; margin: 24px auto; padding: 12px 28px; background: #9f000b; color: #ffffff !important; text-decoration: none; border-radius: 8px; font-size: 15px; font-weight: 600; text-align: center; }
    .footer { text-align: center; font-size: 12px; color: #5e5a52; margin-top: 20px; padding: 0 20px; }
    .muted { color: #5e5a52; font-size: 13px; }
    .details { margin: 20px 0; padding: 16px 18px; background: #f6f1e7; border: 1px solid #e6dec9; border-radius: 8px; }
    .details h3 { margin: 0 0 4px; font-size: 16px; color: #1a1a1a; }
    .details .topic { margin: 0 0 12px; font-size: 14px; color: #5e5a52; font-style: italic; }
    .details dl { margin: 0; font-size: 14px; }
    .details dt { font-weight: 600; color: #5e5a52; margin-top: 8px; }
    .details dt:first-child { margin-top: 0; }
    .details dd { margin: 2px 0 0; padding: 0; color: #1a1a1a; }
    .details a { color: #9f000b; text-decoration: none; }
    .details a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <div class="logo">opkomst</div>
      <div class="content">
        {% block content %}{% endblock %}
      </div>
    </div>
    <div class="footer">
      {% block footer %}{% endblock %}
    </div>
  </div>
</body>
</html>
