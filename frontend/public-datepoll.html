<!doctype html>
<html lang="nl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" sizes="192x192" href="/favicon.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <!--
      The backend's ``/d/{slug}`` handler injects per-datepoll
      ``<title>`` + Open Graph + Twitter Card meta tags here so link
      previews show the poll name. For unknown slugs the injection
      falls back to the bare site title. Marker comment below; do not
      remove.
    -->
    <!-- OPKOMST_HEAD_INJECTION -->
    <style>
      html { box-sizing: border-box; }
      *, *::before, *::after { box-sizing: inherit; }
      :root {
        --brand-red: #9f000b;
        --brand-bg: #f6f1e7;
        --brand-surface: #fbf7ee;
        --brand-text: #1a1a1a;
        --brand-text-muted: #5e5a52;
        --brand-border: #e6dec9;
      }
      body {
        margin: 0;
        font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
        background: var(--brand-bg);
        color: var(--brand-text);
        line-height: 1.5;
      }
      .app-boot {
        position: fixed; inset: 0;
        display: flex; align-items: center; justify-content: center;
        flex-direction: column; gap: 1rem;
      }
      .app-boot-ring {
        width: 36px; height: 36px;
        border: 3px solid var(--brand-border);
        border-top-color: var(--brand-red);
        border-radius: 50%;
        animation: app-boot-spin 0.8s linear infinite;
      }
      .app-boot-text { color: var(--brand-text-muted); font-size: 0.9375rem; }
      @keyframes app-boot-spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <!--
      The backend's ``/d/{slug}`` handler injects a ``<script>`` block
      here that defines ``window.__OPKOMST_DATEPOLL__`` with the poll
      payload (or ``null`` if the slug isn't known or the poll is
      archived). The mini-app reads it on mount and renders without an
      API round-trip. Marker comment below; do not remove.
    -->
    <!-- OPKOMST_DATEPOLL_INJECTION -->
    <div id="app">
      <div class="app-boot" aria-hidden="true">
        <div class="app-boot-ring"></div>
        <div class="app-boot-text">opkomst</div>
      </div>
    </div>
    <script type="module" src="/src/public_datepoll/main.ts"></script>
  </body>
</html>
